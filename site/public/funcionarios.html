<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argos | Funcionários</title>
    <script src="./js/sessao.js"></script>
    <link rel="stylesheet" href="./css/funcionarios.css">
    <link rel="icon" href="./assets/LogoArgos.png">
</head>

<body>
    <header class="sidebar">
        <div class="logo">
            <a href="index.html">
                <img src="./assets/LogoArgosIcon.png" alt="Argos">
            </a>
        </div>

        <ul class="listaOpcoes">
            <li>
                <a href="./gestor_servidores_arthur.html">
                    <div class="item">
                        <img src="./assets/server2.png" alt="Servidores">
                        <p>Servidores</p>
                    </div>
                </a>
            </li>

            <li>
                <a href="relatorios.html">
                    <div class="item">
                        <img src="./assets/file.png" alt="Relatórios">
                        <p>Relatórios</p>
                    </div>
                </a>
            </li>

            <li>
                <a href="./funcionarios.html">
                    <div class="item">
                        <img src="./assets/team.png" alt="Funcionários">
                        <p>Funcionários</p>
                    </div>
                </a>
            </li>
        </ul>

        <div class="saida">
            <div class="item">
                <a href="./perfil.html" id="perfil_botao">
                    <img src="./assets/user3.png" alt="Perfil">
                    <p>Gestor</p>
                    <p id="nome_usuario">Perfil</p>
                </a>
            </div>

            <a href="index.html">
                <div class="item">
                    <img src="./assets/saida.png" alt="Sair" onclick="logout()">
                    <p>Sair</p>
                </div>
            </a>
        </div>
    </header>

    <div class="conteudo">
        <div class="box">
            <div class="retangulo">
                <p>Funcionários Cadastrados</p>
                <button class="btn-adicionar" onclick="window.location.href='cadastro_func.html'">
                    Adicionar Funcionário
                </button>
            </div>
        </div>

        <div class="container-lista">
            <table class="tabela-funcionarios">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabelaFuncionarios">
                    <tr>
                        <td colspan="4">Carregando funcionários...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>

<script>
    nome_usuario.innerHTML = sessionStorage.NOME_USUARIO || "Perfil";

    window.onload = function () {
        listarFuncionarios();
    };

    function listarFuncionarios() {
        var idGestor = sessionStorage.ID_USUARIO;

        if (!idGestor) {
            corpoTabelaFuncionarios.innerHTML = `
                <tr>
                    <td colspan="4">Gestor não encontrado na sessão.</td>
                </tr>
            `;
            return;
        }

        fetch(`/usuarios/listar_funcionarios/${idGestor}`)
            .then(function (resposta) {
                if (!resposta.ok) {
                    throw "Erro ao buscar funcionários";
                }

                return resposta.json();
            })
            .then(function (funcionarios) {
                montarTabelaFuncionarios(funcionarios);
            })
            .catch(function (erro) {
                console.log(erro);
                corpoTabelaFuncionarios.innerHTML = `
                    <tr>
                        <td colspan="4">Não foi possível carregar os funcionários.</td>
                    </tr>
                `;
            });
    }

    function montarTabelaFuncionarios(funcionarios) {
        corpoTabelaFuncionarios.innerHTML = "";

        if (!funcionarios || funcionarios.length === 0) {
            corpoTabelaFuncionarios.innerHTML = `
                <tr>
                    <td colspan="4">Nenhum funcionário cadastrado.</td>
                </tr>
            `;
            return;
        }

        funcionarios.forEach(function (funcionario) {
            corpoTabelaFuncionarios.innerHTML += `
                <tr>
                    <td>${funcionario.nome}</td>
                    <td>${funcionario.email}</td>
                    <td><span class="status-ativo">${funcionario.funcao || "Funcionário"}</span></td>
                    <td>
                        <button class="btn-excluir" onclick="excluirFuncionario(${funcionario.id_usuario})">
                            Excluir
                        </button>
                    </td>
                </tr>
            `;
        });
    }

    function excluirFuncionario(idUsuario) {
        var idGestor = sessionStorage.ID_USUARIO;

        if (!confirm("Deseja excluir este funcionário?")) {
            return;
        }

        fetch("/usuarios/excluir_funcionario", {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                idUsuarioServer: idUsuario,
                fkResponsavelServer: idGestor
            })
        })
            .then(function (resposta) {
                if (!resposta.ok) {
                    throw "Erro ao excluir funcionário";
                }

                listarFuncionarios();
            })
            .catch(function (erro) {
                console.log(erro);
                alert("Não foi possível excluir o funcionário.");
            });
    }
</script>
