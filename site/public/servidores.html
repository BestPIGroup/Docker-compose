<script>

    const crit = document.getElementById("crit");
    const atencao = document.getElementById("atencao");
    const totalHard = document.getElementById("alert");

    async function buscarServidores() {

        totalCrit = 0
        totalAlerta = 0

        try {

            const respostaServidores =
                await fetch("servidores/buscar_servidores", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    }, body: JSON.stringify({
                        fkUnidade: sessionStorage.ID_UNIDADE
                    })
                });

            const servers = await respostaServidores.json();

            await Promise.all(

                servers.map(async (server) => {

                    const respostaRegistro =
                        await fetch("conexaoS3/buscar_registros", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                            },
                            body: JSON.stringify({
                                MacServer: "4c:44:5b:f2:74:61",
                                QtdLinhas: 1
                            })
                        });

                    const registros = await respostaRegistro.json();
                    server.ultimoRegistro = registros[0];

                    const respostaLimites =
                        await fetch("servidores/buscar_limites", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                            },
                            body: JSON.stringify({
                                id: server.id_servidor
                            })
                        });

                    const limites = await respostaLimites.json();

                    server.limites = limites;
                    server.nivelAlerta = 0;
                    server.totalAlertas = 0;
                    server.totalCriticos = 0;

                    server.limites.push({

                        id_servidor: server.id_servidor,
                        id_componente: 99,
                        limite_componente: server.limites[3].limite_componente + server.limites[4].limite_componente,
                        exibir: 1

                    });

                    server.limites.splice(3, 2);

                    console.log(server)
                    console.log(serv.limites)

                    if (server.limites[0].limite_componente <= server.ultimoRegistro[3]) {

                        server.nivelAlerta += 2;
                   
                    } else if (server.limites[0].limite_componente <= server.ultimoRegistro[3] * 0.8) {

                        server.nivelAlerta++;
                   
                    }

                    if (server.limites[1].limite_componente <= server.ultimoRegistro[9]) {

                        server.nivelAlerta += 2;
                   
                    } else if (server.limites[1].limite_componente <= server.ultimoRegistro[9] * 0.8) {

                        server.nivelAlerta++;
                   
                    }

                    if (server.limites[2].limite_componente <= server.ultimoRegistro[11]) {

                        server.nivelAlerta += 2;
                   
                    } else if (server.limites[2].limite_componente <= server.ultimoRegistro[11] * 0.8) {

                        server.nivelAlerta++;
                   
                    }

                    const pacotes = Number(server.ultimoRegistro[15]) + Number(server.ultimoRegistro[16]);

                    if (server.limites[3].limite_componente <= pacotes) {

                        server.nivelAlerta += 2;

                    } else if (server.limites[3].limite_componente <= pacotes * 0.8) {

                        server.nivelAlerta++;

                    }

                })

            );

            servers.sort((a, b) => b.nivelAlerta - a.nivelAlerta);

            console.log(servers);

            const box = document.getElementById("servers");

            servers.forEach(server => {

                console.log(server)

                classeAdicional = ""
                nvAlerta = "Normal"
                seguranca = "Normal"
                corTexto = "sec-ok"
                StatusCriticidade = `Normal`
                
                if (server.nivelAlerta >= 4) {
                    
                    classeAdicional = "card-erro"
                    nvAlerta = "Crítico"
                    seguranca = "Comprometida"
                    corTexto = "sec-bad"
                    totalCrit ++;
                    StatusCriticidade = `Critico`
                    
                } else if (server.nivelAlerta >= 2) {
                    
                    classeAdicional = "card-atencao"
                    nvAlerta = "Atenção"
                    totalAlerta++;
                    StatusCriticidade = `Alerta`

                }

                propCPU = 0
                propRAM = 0
                propDISCO = 0
                propPACKS = 0

                if ((server.ultimoRegistro[3] / server.limites[0].limite_componente) * 100 > 100) {

                    propCPU = 100

                } else {

                    propCPU = (server.ultimoRegistro[3] / server.limites[0].limite_componente) * 100;

                }

                if ((server.ultimoRegistro[9] / server.limites[1].limite_componente) * 100 > 100) {

                    propRAM = 100

                } else {

                    propRAM = (server.ultimoRegistro[9] / server.limites[1].limite_componente) * 100;

                }

                if ((server.ultimoRegistro[11] / server.limites[2].limite_componente) * 100 > 100) {

                    propDISCO = 100

                } else {

                    propDISCO = (server.ultimoRegistro[11] / server.limites[2].limite_componente) * 100;

                }

                if ((Number(server.ultimoRegistro[15]) + Number(server.ultimoRegistro[16]) / server.limites[3].limite_componente) * 100 > 100) {

                    propPACKS = 100

                } else {

                    propPACKS = (Number(server.ultimoRegistro[15]) + Number(server.ultimoRegistro[16]) / server.limites[3].limite_componente) * 100;

                }

                crit.textContent = totalCrit
                atencao.textContent = totalAlerta
                totalHard.textContent = totalCrit + totalAlerta

                console.log(server.endereco_mac)

                box.innerHTML +=
                    `<div onclick="redirecionar('${server.endereco_mac}','${server.alias}','${server.nivelAlerta}','${totalCrit}','${totalAlerta}','${server.id_servidor}','${StatusCriticidade}')">
                                    <div class="card ${classeAdicional}">
                                        <div class="header">
                                            <strong>${server.alias}</strong>
                                            <span>● ${nvAlerta}</span>
                                        </div>
                                        <div class="metric">
                                            CPU ${Math.round(server.ultimoRegistro[3], 2)}%
                                            <div class="bar">
                                                <div class="fill cpu" style="width:${propCPU}%"></div>
                                            </div>
                                        </div>
                                        <div class="metric">
                                            RAM ${Math.round(server.ultimoRegistro[9], 2)}%
                                            <div class="bar">
                                                <div class="fill ram" style="width:${propRAM}%"></div>
                                            </div>
                                        </div>
                                        <div class="metric">
                                            Disco ${Math.round(server.ultimoRegistro[11], 2)}%
                                            <div class="bar">
                                                <div class="fill disk" style="width:${propDISCO}%"></div>
                                            </div>
                                        </div>
                                        <div class="metric">
                                            Pacotes ${Math.round(Number(server.ultimoRegistro[15]) + Number(server.ultimoRegistro[16]), 2)}
                                            <div class="bar">
                                                <div class="fill net" style="width:${propPACKS}%"></div>
                                            </div>
                                        </div>
                                        <div class="process">Processos: ${server.ultimoRegistro[8]}</div>
                                        <div class="process">
                                            <img src="./assets/unlockWhite.png" alt=""> 
                                            Segurança:
                                            <span class="${corTexto}">
                                            ${seguranca}
                                            </span>
                                        </div>
                                        <div class="process">
                                            <img src="./assets/bellWhite.png" alt=""> 
                                            Ameaças: ${server.nivelAlerta}
                                        </div>
                                    </div>
                                </div>`;

            });

        } catch (erro) {

            console.error("Erro ao processar servidores:", erro);

        }

    }

    function redirecionar(mac,alias,nivelAlerta,totalCriticos,totalAlertas,idServidor,status) {

        sessionStorage.setItem("MAC", mac);
        sessionStorage.setItem("ALIAS", alias);
        sessionStorage.setItem("NV_ALERTA", nivelAlerta);
        sessionStorage.setItem("TOTAL_CRITICOS", totalCriticos);
        sessionStorage.setItem("TOTAL_ALERTAS", totalAlertas);
        sessionStorage.setItem("ID_SERVIDOR", idServidor);
        sessionStorage.setItem("STATUS", status);

        window.location.href = "./dash_componentes.html";

    }
