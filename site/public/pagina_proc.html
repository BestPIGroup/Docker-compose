<script>

    let graficoProcessos = null;

    let graficoContexto = null;

    function carregarGraficos() {

            })

            .then(dados => {

                if (!dados || dados.length === 0) {
                    console.log("Nenhum dado encontrado para esse MAC.");
                    return;
                }

                const ultimo = dados[0];
                const historicoGrafico = dados.slice();



                atualizarKPI(ultimo, dados);

                criarGraficoContexto(historicoGrafico);

    function atualizarKPI(ultimo, historico) {

    const trocasPorSegundo = calcularTrocasPorSegundo(historico);

        trocasPorSegundo.toLocaleString("pt-BR") + "/s";

    
        const horaUltimaCaptura = ultimo.timestamp.split(" ")[1].substring(0, 5);

    cardStatus.style.borderColor = status.cor;
}

    function converterTimestamp(timestamp) {
        const partes = timestamp.split(" ");
        const data = partes[0];
        const hora = partes[1];

        const [dia, mes, ano] = data.split("/");
        const [h, min, seg] = hora.split(":");

        return new Date(ano, mes - 1, dia, h, min, seg);
    }

    function calcularTrocasPorSegundo(dados) {
        if (!dados || dados.length < 2) {
            return 0;
        }

        const atual = dados[0];
        const anterior = dados[1];

        const delta = Number(atual.cpuCtxSwitches) - Number(anterior.cpuCtxSwitches);

        const dataAtual = converterTimestamp(atual.timestamp);
        const dataAnterior = converterTimestamp(anterior.timestamp);

        const segundos = (dataAtual - dataAnterior) / 1000;

        if (segundos <= 0) {
            return 0;
        }

        return Math.round(delta / segundos);
    }

    function calcularDeltaContexto(dados) {
        if (!dados || dados.length < 2) {
            return 0;
        }

        const atual = dados[0];
        const anterior = dados[1];

        const valorAtual = Number(atual.cpuCtxSwitches);
        const valorAnterior = Number(anterior.cpuCtxSwitches);

        return valorAtual - valorAnterior;
    }

    function criarGraficoProcessos(historico) {
        const labels = historico.map(item => {
            const hora = item.timestamp.split(" ")[1];
            return hora.substring(0, 5);
        });

        const valores = historico.map(linha => Number(linha.totalProcessos)).reverse();

        const ctx = document.getElementById("myChart").getContext("2d");

        if (graficoProcessos) {
            graficoProcessos.destroy();
        }

            type: "line",

                    pointBackgroundColor: "#00FF00",
                    pointBorderColor: "#00FF00",
                    borderWidth: 2,
                    tension: 0.3,
                    fill: true
                }]

            options: {

                        }
                    },

                        annotations: {

                                    backgroundColor: "#E74C3C",
                                    position: "end"
                                },
                                font: {
                                    size: 9
                                }
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            color: "#FFFFFF"
                        }
                    },
                    y: {

                        ticks: {

    }


    function criarGraficoContexto(historico) {
        const historicoOrdenado = [...historico].reverse();

        const labels = [];
        const valores = [];

        for (let i = 1; i < historicoOrdenado.length; i++) {
            const atual = historicoOrdenado[i];
            const anterior = historicoOrdenado[i - 1];

            const hora = atual.timestamp.split(" ")[1].substring(0, 5);

            const delta = Math.max(
                0,
                Number(atual.cpuCtxSwitches) -
                Number(anterior.cpuCtxSwitches)
            );

            labels.push(hora);
            valores.push(delta);
        }

        const ctx = document
            .getElementById("grafico-contexto")
            .getContext("2d");

        if (graficoContexto) {
            graficoContexto.destroy();
        }

        graficoContexto = new Chart(ctx, {
            type: "line",

            data: {
                labels: labels,

                datasets: [{
                    label: "Trocas de Contexto",
                    data: valores,

                    fill: true,

                    borderColor: "#F1C40F",
                    backgroundColor: "rgba(241,196,15,0.15)",

                    pointBackgroundColor: "#F1C40F",
                    pointBorderColor: "#F1C40F",

                    borderWidth: 2,
                    tension: 0.4
                }]
            },

            options: {
                responsive: true,

                plugins: {
                    legend: {
                        labels: {
                            color: "#FFFFFF",
                            font: {
                                size: 14,
                                weight: "bold"
                            }
                        }
                    },

                    annotation: {
                        annotations: {

                            limiteAtencao: {
                                type: "line",
                                yMin: 100000,
                                yMax: 100000,

                                borderColor: "#F1C40F",
                                borderWidth: 2,
                                borderDash: [6, 6],

                                label: {
                                    display: true,
                                    content: "Atenção",

                                    color: "#FFFFFF",
                                    backgroundColor: "#F1C40F",

                                    position: "end",

                                    padding: 2,

                                    font: {
                                        size: 8,
                                        weight: "normal"
                                    }
                                }
                            },

                            limiteCritico: {
                                type: "line",
                                yMin: 150000,
                                yMax: 150000,

                                borderColor: "#E74C3C",
                                borderWidth: 2,
                                borderDash: [6, 6],

                                label: {
                                    display: true,
                                    content: "Crítico",

                                    color: "#FFFFFF",
                                    backgroundColor: "#E74C3C",

                                    position: "end",

                                    padding: 2,

                                    font: {
                                        size: 8,
                                        weight: "normal"
                                    }
                                }
                            }
                        }
                    }
                },

                scales: {
                    x: {
                        ticks: {
                            color: "#FFFFFF"
                        },
                        grid: {
                            color: "rgba(255,255,255,0.08)"
                        }
                    },

                    y: {
                        beginAtZero: true,

                        ticks: {
                            color: "#FFFFFF"
                        },

                        grid: {
                            color: "rgba(255,255,255,0.08)"
                        }
                    }
                }
            }
        });
    }

    function renderizarTabelaProcessos(historico) {
        const corpo = document.getElementById("corpo-tabela-processos");
        corpo.innerHTML = "";

        const contagem = {};

        historico.forEach(function (linha) {
            const processosTexto = linha.top3ProcessosCpu;

            if (!processosTexto) return;

            const processos = processosTexto
                .replaceAll("[[", "")
                .replaceAll("]]", "")
                .split("], [");

            processos.forEach(function (processo) {
                const dados = processo
                    .replaceAll("[", "")
                    .replaceAll("]", "")
                    .replaceAll("'", "")
                    .split(",");

                const pid = dados[0]?.trim();
                const nome = dados[1]?.trim();

                if (!nome) return;

                if (!contagem[nome]) {
                    contagem[nome] = {
                        pid: pid,
                        nome: nome,
                        quantidade: 0
                    };
                }

                contagem[nome].quantidade++;
            });
        });

        const top5 = Object.values(contagem)
            .sort((a, b) => b.quantidade - a.quantidade)
            .slice(0, 5);

        top5.forEach(function (processo) {
            corpo.innerHTML += `
            <tr>
                <td>${processo.pid}</td>
                <td>${processo.nome}</td>
                <td>${processo.quantidade}</td>
            </tr>
        `;
        });
    }

    function criarGraficos(historico, limites) {

        graficosCriados.forEach(function (grafico) {
            grafico.destroy();
        });

        graficosCriados = [];

        var container = document.querySelector(".graficos");

            {

        ];

        componentes.forEach(function (componente, indice) {

            });

            var contexto = document.getElementById(`grafico-${indice}`).getContext("2d");

            var grafico = new Chart(contexto, {

                type: "line",

                data: {

                    labels: labels,

                    datasets: [
                        {

                            data: valores,
                            borderColor: componente.cor,
                            backgroundColor: "rgba(245, 73, 39,0.05)",
                            fill: true,
                            tension: 0.3,
                            borderWidth: 2,
                            pointRadius: 1
                        }
                    ]
                },

                options: {

                    responsive: true,
                    maintainAspectRatio: false
                }
            })
        })
    }

    const LIMITE_PROCESSOS_ATENCAO = 5000;
    const LIMITE_PROCESSOS_CRITICO = 6000;

    const LIMITE_CONTEXTO_ATENCAO = 100000;
    const LIMITE_CONTEXTO_CRITICO = 150000;

    function calcularStatusServidor(historico) {
    const historicoOrdenado = [...historico].reverse();

    const valoresProcessos = historicoOrdenado.map(item =>
        Number(item.totalProcessos)
    );

    const valoresContexto = [];

    for (let i = 1; i < historicoOrdenado.length; i++) {
        const atual = historicoOrdenado[i];
        const anterior = historicoOrdenado[i - 1];

        const delta = Math.max(
            0,
            Number(atual.cpuCtxSwitches) -
            Number(anterior.cpuCtxSwitches)
        );

        valoresContexto.push(delta);
    }

    const passouCriticoProcessos = valoresProcessos.some(valor =>
        valor >= LIMITE_PROCESSOS_CRITICO
    );

    const passouCriticoContexto = valoresContexto.some(valor =>
        valor >= LIMITE_CONTEXTO_CRITICO
    );

    if (passouCriticoProcessos || passouCriticoContexto) {
        return {
            texto: "Crítico",
            cor: "#E74C3C"
        };
    }

    const passouAtencaoProcessos = valoresProcessos.some(valor =>
        valor >= LIMITE_PROCESSOS_ATENCAO
    );

    const passouAtencaoContexto = valoresContexto.some(valor =>
        valor >= LIMITE_CONTEXTO_ATENCAO
    );

    if (passouAtencaoProcessos || passouAtencaoContexto) {
        return {
            texto: "Atenção",
            cor: "#F1C40F"
        };
    }

    return {
        texto: "Normal",
        cor: "#2ECC71"
    };
}


    let intervaloDashboard = null;

    function iniciarDashboard() {
        carregarGraficos();

        intervaloDashboard = setInterval(function () {
            carregarGraficos();
        }, 10000);
    }
</script>
