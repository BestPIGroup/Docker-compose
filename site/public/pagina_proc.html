<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

let graficoProcessos = null;

let graficoContexto = null;

function carregarGraficos() {
    fetch("/dashProcessos/buscar_registros", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            MacServer: sessionStorage.MAC,
            QtdLinhas: 10
        })
    })
    .then(resposta => resposta.json())
    .then(dados => {
        console.log(dados);

        if (!dados || dados.length === 0) {
            console.log("Nenhum dado encontrado para esse MAC.");
            return;
        }

        const ultimo = dados[0];

        atualizarKPI(ultimo, dados);
        criarGraficoProcessos(dados);
        criarGraficoContexto(dados);
        renderizarTabelaProcessos(dados);
        renderizarTabelaArquivosSimulados();
    })
    .catch(erro => {
        console.log("Erro ao carregar dashboard:", erro);
    });
}

function atualizarKPI(ultimo, historico) {
    document.getElementById("server-user").innerHTML = ultimo.usuario;
    document.getElementById("kpi-total-processos").innerHTML = ultimo.totalProcessos;

    document.getElementById("kpi-maximo-processos").innerHTML =
        Math.max(...historico.map(linha => Number(linha.totalProcessos)));

    document.getElementById("kpi-usuarios-logados").innerHTML = ultimo.usuariosLogados;
}

function criarGraficoProcessos(historico) {
    const labels = historico.map(item => {
    const hora = item.timestamp.split(" ")[1];
    return hora.substring(0, 5);
});
    const valores = historico.map(linha => Number(linha.totalProcessos)).reverse();

    const ctx = document.getElementById("myChart").getContext("2d");

    if (graficoProcessos) {
        graficoProcessos.destroy();
    }

    graficoProcessos = new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Total de processos",
                data: valores,
                borderWidth: 2,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
}

function criarGraficoContexto(historico) {
    const labels = historico.map(item => {
    const hora = item.timestamp.split(" ")[1];
    return hora.substring(0, 5);
});
    const valores = historico.map(linha => Number(linha.cpuCtxSwitches)).reverse();

    const ctx = document.getElementById("grafico-contexto").getContext("2d");

    if (graficoContexto) {
        graficoContexto.destroy();
    }

    graficoContexto = new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Trocas de contexto",
                data: valores,
                borderWidth: 2,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
}


function renderizarTabelaProcessos(historico) {
    const corpo = document.getElementById("corpo-tabela-processos");
    corpo.innerHTML = "";

    const contagem = {};

    historico.forEach(function (linha) {
        const processosTexto = linha.top3ProcessosCpu;

        if (!processosTexto) return;

        const processos = processosTexto
            .replaceAll("[[", "")
            .replaceAll("]]", "")
            .split("], [");

        processos.forEach(function (processo) {
            const dados = processo
                .replaceAll("[", "")
                .replaceAll("]", "")
                .replaceAll("'", "")
                .split(",");

            const pid = dados[0]?.trim();
            const nome = dados[1]?.trim();

            if (!nome) return;

            if (!contagem[nome]) {
                contagem[nome] = {
                    pid: pid,
                    nome: nome,
                    quantidade: 0
                };
            }

            contagem[nome].quantidade++;
        });
    });

    const top5 = Object.values(contagem)
        .sort((a, b) => b.quantidade - a.quantidade)
        .slice(0, 5);

    top5.forEach(function (processo) {
        corpo.innerHTML += `
            <tr>
                <td>${processo.pid}</td>
                <td>${processo.nome}</td>
                <td>${processo.quantidade}</td>
            </tr>
        `;
    });
}

    ["python.exe", "C:\\Projetos\\Argos\\monitoramento.py"],
    ["mysqld.exe", "C:\\ProgramData\\MySQL\\data\\argos.ibd"],

    ["node.exe", "C:\\Users\\Gamer\\Desktop\\Argos\\server.js"],

function renderizarTabelaArquivosSimulados() {
    const corpo = document.getElementById("corpo-tabela-arquivos");

    corpo.innerHTML = "";

    const embaralhados = arquivosSimulados
        .sort(() => Math.random() - 0.5)
        .slice(0, 5);

    embaralhados.forEach(item => {
        corpo.innerHTML += `
            <tr>
                <td>${item[0]}</td>
                <td>${item[1]}</td>
            </tr>
        `;
    });
}

                            borderColor: componente.cor,

let intervaloDashboard = null;

function iniciarDashboard() {
    carregarGraficos();

    intervaloDashboard = setInterval(function () {
        carregarGraficos();
    }, 10000);
}
</script>
