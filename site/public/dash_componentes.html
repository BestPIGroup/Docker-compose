    function obterStatus(valorAtual, valorAtencao, valorCritico) {

        if (valorAtual < valorAtencao) {

            return "ok";

        } else if (valorAtual < valorCritico) {

            return "atencao";

        } else {

            return "crit";

        }

    }

    function gerarCorrelacoes(dadosComponentes) {
        const paresCorrelacao = [
            { eixoX: 'CPU', eixoY: 'Processos', rotuloX: 'CPU Uso (%)', rotuloY: 'Nº Processos', corPonto: '#7ab8f5' },
            { eixoX: 'CPU', eixoY: 'RAM', rotuloX: 'RAM Uso (%)', rotuloY: 'CPU Uso (%)', corPonto: '#7ab8f5' },
            { eixoX: 'CPU', eixoY: 'Rede', rotuloX: 'CPU Uso (%)', rotuloY: 'Tráfego Rede (Mbps)', corPonto: '#f5c842' },
        ];

        const container = document.getElementById('correlacoes-lista');
        if (!container) return;
        container.innerHTML = '';

        paresCorrelacao.forEach(function (par, indice) {
            const valoresX = dadosComponentes[par.eixoX];
            const valoresY = dadosComponentes[par.eixoY];
            if (!valoresX || !valoresY) return;

            const maximoY = Math.max.apply(null, valoresY);
            const valoresYNorm = valoresY.map(function (v) { return Math.round((v / maximoY) * 100); });

            const quantidade = valoresX.length;
            const mediaX = valoresX.reduce(function (a, b) { return a + b; }, 0) / quantidade;
            const mediaY = valoresYNorm.reduce(function (a, b) { return a + b; }, 0) / quantidade;
            const numerador = valoresX.reduce(function (soma, x, i) { return soma + (x - mediaX) * (valoresYNorm[i] - mediaY); }, 0);
            const denominadorX = Math.sqrt(valoresX.reduce(function (soma, x) { return soma + (x - mediaX) * (x - mediaX); }, 0));
            const denominadorY = Math.sqrt(valoresYNorm.reduce(function (soma, y) { return soma + (y - mediaY) * (y - mediaY); }, 0));
            const correlacao = (denominadorX && denominadorY) ? +(numerador / (denominadorX * denominadorY)).toFixed(2) : 0;

            const inclinacao = numerador / (denominadorX * denominadorX || 1);
            const intercepto = mediaY - inclinacao * mediaX;
            const xMinimo = Math.min.apply(null, valoresX), xMaximo = Math.max.apply(null, valoresX);

            const idCanvas = 'corr-' + indice;

            var tituloPar = par.eixoY + ' vs. ' + par.eixoX

            if (correlacao >= 0.8) {
                var tituloPar = par.eixoY + ' vs. ' + par.eixoX + ' (Correlação: Forte | Atenção!)';
            } else if (correlacao >= 0.6) {
                var tituloPar = par.eixoY + ' vs. ' + par.eixoX + ' (Correlação: Média | Atenção!)';
            } else if (correlacao <= -0.8) {
                var tituloPar = par.eixoY + ' vs. ' + par.eixoX + ' (Correlação: Média | Atenção!)';
            } else if (correlacao <= -0.6) {
                var tituloPar = par.eixoY + ' vs. ' + par.eixoX + ' (Correlação: Forte | Atenção!)';
            } else {
                var tituloPar = par.eixoY + ' vs. ' + par.eixoX + ' (Correlação: Fraca | Atenção!)';
            }

            const bloco = document.createElement('div');
            bloco.className = 'corr-item';
            bloco.innerHTML =
                '<div class="corr-titulo">' + tituloPar + '</div>' +
                '<div class="corr-canvas-wrap"><canvas id="' + idCanvas + '"></canvas></div>';
            container.appendChild(bloco);

            const pontos = valoresX.map(function (x, i) { return { x: x, y: valoresYNorm[i] }; });
            const tendencia = [
                { x: xMinimo, y: +(inclinacao * xMinimo + intercepto).toFixed(1) },
                { x: xMaximo, y: +(inclinacao * xMaximo + intercepto).toFixed(1) }
            ];

            const contexto = document.getElementById(idCanvas).getContext('2d');
            new Chart(contexto, {
                type: 'scatter',
                data: {
                    datasets: [
                        { label: 'Dados', data: pontos, backgroundColor: par.corPonto + 'cc', pointRadius: 4, pointHoverRadius: 6 },
                        { label: 'Tendência', data: tendencia, type: 'line', borderColor: par.corPonto, borderWidth: 2, pointRadius: 0, fill: false, tension: 0 }
                    ]

                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false }, title: { display: false } },
                    scales: {
                        x: {
                            title: { display: true, text: par.rotuloX, color: 'rgba(255,255,255,0.5)', font: { size: 9 } },
                            ticks: { color: '#aaa', font: { size: 9 } },
                            grid: { color: 'rgba(255,255,255,0.07)' },
                            min: 0, max: 100
                        },
                        y: {
                            title: { display: true, text: par.rotuloY, color: 'rgba(255,255,255,0.5)', font: { size: 9 } },
                            ticks: { color: '#aaa', font: { size: 9 } },
                            grid: { color: 'rgba(255,255,255,0.07)' },
                            min: 0, max: 100
                        }
                    }
                }
            });
        });
    }
